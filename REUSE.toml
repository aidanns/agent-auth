# SPDX-FileCopyrightText: 2026 Aidan Nagorcka-Smith
# SPDX-License-Identifier: MIT
#
# Licensing overrides for files that cannot carry an inline SPDX header —
# binary assets, generated diagrams, the LICENSE text itself, and JSON
# configs. See https://reuse.software/spec/.

version = 1

[[annotations]]
path = "LICENSE.md"
precedence = "override"
SPDX-FileCopyrightText = "2026 Aidan Nagorcka-Smith"
SPDX-License-Identifier = "MIT"

# design/functional_decomposition.{d2,md} and design/product_breakdown.{d2,md}
# are regenerated from the sibling yaml via `task design:generate`
# (scripts/design-generate.sh). The `systems-engineering` generator does
# not emit inline SPDX headers; post-processing the output would couple
# the generator to this project's licensing policy, so the licensing
# metadata lives here instead. Hand-written design docs (DESIGN.md,
# ASSURANCE.md, etc.) keep their inline SPDX comments.
[[annotations]]
path = [
    "design/functional_decomposition.d2",
    "design/functional_decomposition.md",
    "design/product_breakdown.d2",
    "design/product_breakdown.md",
    "design/**.csv",
    "design/**.png",
    "design/**.svg",
]
SPDX-FileCopyrightText = "2026 Aidan Nagorcka-Smith"
SPDX-License-Identifier = "MIT"

[[annotations]]
path = [
    ".releaserc.mjs",
    ".vscode/extensions.json",
    ".vscode/launch.json",
    ".vscode/settings.json",
    "package-lock.json",
    "package.json",
    "pyrightconfig.json",
]
SPDX-FileCopyrightText = "2026 Aidan Nagorcka-Smith"
SPDX-License-Identifier = "MIT"

# CHANGELOG.md is managed by @semantic-release/changelog, which anchors new
# release sections to a `# Changelog` title at the top of the file. An inline
# HTML SPDX comment would push the title off the first line and break that
# anchor, so the header is declared here instead.
[[annotations]]
path = "CHANGELOG.md"
SPDX-FileCopyrightText = "2026 Aidan Nagorcka-Smith"
SPDX-License-Identifier = "MIT"

[[annotations]]
path = "uv.lock"
SPDX-FileCopyrightText = "2026 Aidan Nagorcka-Smith"
SPDX-License-Identifier = "MIT"
