# treefmt formatter/linter multiplexer.
# shfmt formatting options live in .editorconfig.
# ruff formatting options live in pyproject.toml ([tool.ruff]).
# mdformat reads .mdformat.toml; taplo reads taplo.toml.
# The authoritative project gate is scripts/lint.sh + scripts/format.sh,
# invoked directly by .github/workflows/check.yml and lefthook.yml.

[formatter.mdformat]
command = "mdformat"
includes = ["*.md"]

[formatter.ruff]
command = "ruff"
options = ["format"]
includes = ["*.py"]

[formatter.shellcheck]
command = "shellcheck"
includes = ["*.sh"]

[formatter.shfmt]
command = "shfmt"
options = ["-w"]
includes = ["*.sh"]

[formatter.taplo]
command = "taplo"
options = ["format"]
includes = ["*.toml"]
