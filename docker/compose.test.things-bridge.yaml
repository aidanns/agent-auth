services:
  agent-auth:
    image: ${AGENT_AUTH_TEST_IMAGE:?set by tests/integration conftest}
    # No published port: tests reach the auth server only via the
    # in-container ``agent-auth`` CLI (used to mint tokens) and via the
    # internal Compose network from the bridge service. Keeping it off
    # the host removes a needless ephemeral-port allocation per test.
    expose:
      - "9100"
    volumes:
      - ${AGENT_AUTH_TEST_CONFIG_DIR:?set by tests/integration conftest}:/home/agent-auth/.config/agent-auth:ro
    stop_grace_period: 5s

  things-bridge:
    image: ${AGENT_AUTH_TEST_IMAGE:?set by tests/integration conftest}
    entrypoint: ["things-bridge", "serve"]
    # Bind only on loopback so the container is never reachable from
    # the rest of the network.
    ports:
      - "127.0.0.1::9200"
    volumes:
      - ${THINGS_BRIDGE_TEST_CONFIG_DIR:?set by tests/integration conftest}:/home/agent-auth/.config/things-bridge:ro
      - ${THINGS_BRIDGE_TEST_FIXTURES_DIR:?set by tests/integration conftest}:/srv/things-fixtures:ro
    depends_on:
      - agent-auth
    stop_grace_period: 5s
