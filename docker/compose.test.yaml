services:
  agent-auth:
    image: ${AGENT_AUTH_TEST_IMAGE:?set by tests/integration/conftest.py}
    # Bind only on loopback so the container is never reachable from the
    # rest of the network.
    ports:
      - "127.0.0.1::9100"
    environment:
      AGENT_AUTH_ACCESS_TOKEN_TTL_SECONDS:
      AGENT_AUTH_REFRESH_TOKEN_TTL_SECONDS:
      AGENT_AUTH_NOTIFICATION_PLUGIN:
      AGENT_AUTH_TEST_APPROVAL:
    stop_grace_period: 5s
