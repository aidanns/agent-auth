# lefthook git hook manager configuration.
# Install with `task install-hooks` (wraps `lefthook install`).
# treefmt multiplexes the per-language formatters (mdformat, ruff format,
# shellcheck, shfmt, taplo) per treefmt.toml. Linters not handled by
# treefmt (ruff check, keep-sorted) and the secret scanner (ripsecrets)
# stay as separate commands.
# shfmt formatting options live in .editorconfig;
# ruff formatting options live in pyproject.toml;
# mdformat reads .mdformat.toml; taplo reads taplo.toml.

pre-push:
  # Advisory-only checks. The PR-time CI workflows
  # (changelog-lint.yml, pr-lint.yml) are the authoritative gates;
  # these hooks just shorten the feedback loop for things commonly
  # caught only after pushing.
  commands:
    changelog-add-reminder:
      # Warn when the local branch has no changelog/@unreleased/pr-<N>-*.yml
      # entry vs. origin/main. The CLI prints to stderr but exits 0
      # (warn-only); the trailing `|| true` is belt-and-braces in case
      # we ever flip --strict into the default. The CI changelog-lint
      # workflow is the authoritative gate.
      run: scripts/changelog/add.sh --check || true

pre-commit:
  parallel: true
  commands:
    keep-sorted:
      # Narrow to file types that currently carry keep-sorted annotations plus
      # common text formats. CI (scripts/lint.sh) scans every tracked file, so
      # new annotations in uncovered types are still caught there.
      glob: "{*.toml,*.sh,*.yml,*.yaml,*.md,*.py,.gitignore}"
      run: keep-sorted --mode=lint {staged_files}
    ripsecrets:
      # Scan staged content for accidentally-committed secrets. Runs on every
      # staged file (no glob filter) so secrets in any extension are caught.
      # `--strict-ignore` makes ripsecrets honour `.secretsignore` even when
      # files are passed as explicit arguments (default: explicit args
      # bypass .secretsignore).
      run: ripsecrets --strict-ignore {staged_files}
    ruff-check:
      # ruff lint runs separately from treefmt — treefmt only invokes
      # `ruff format` (see treefmt.toml).
      glob: "*.py"
      run: ruff check {staged_files}
    test-fast:
      # Smoke subset of the unit tests (tokens, scopes, crypto, keys) — the
      # security-critical core whose breakage would mask downstream test
      # failures. Sub-second runtime keeps the pre-commit cycle interactive.
      glob: "{*.py,pyproject.toml,uv.lock}"
      run: bash scripts/test.sh --fast -q
    treefmt:
      # `--no-cache --fail-on-change` is the `treefmt --ci` shorthand
      # without the CI-only log tweaks — keeps lefthook output readable.
      run: treefmt --no-cache --fail-on-change {staged_files}
