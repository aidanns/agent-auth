[build-system]
requires = ["setuptools>=68.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[project]
name = "gpg-cli"
dynamic = ["version"]
description = "Devcontainer-side gpg replacement that forwards git's sign/verify requests to a host gpg-bridge"
requires-python = ">=3.11"
dependencies = [
    # keep-sorted start
    "agent-auth-common",
    "pyyaml>=6.0",
    # keep-sorted end
]

[project.scripts]
gpg-cli = "gpg_cli.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools_scm]
fallback_version = "0.0.0+unknown"

[tool.uv.sources]
agent-auth-common = { workspace = true }

[tool.pytest.ini_options]
# Per-package pytest config. See packages/agent-auth/pyproject.toml
# for the full rationale.
addopts = [
    "--import-mode=importlib",
    "--cov=gpg_cli",
    "--cov-branch",
    "--cov-report=term-missing",
    "--cov-fail-under=53",
]
pythonpath = [
    # keep-sorted start
    "../agent-auth-common/src",
    "src",
    # keep-sorted end
]
testpaths = ["tests"]
