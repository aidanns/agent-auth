[build-system]
requires = ["setuptools>=68.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[project]
name = "gpg-backend-cli-host"
dynamic = ["version"]
description = "Host-side GPG signing backend invoked as a subprocess by gpg-bridge"
requires-python = ">=3.11"
dependencies = [
    # keep-sorted start
    "agent-auth-common",
    # keep-sorted end
]

[project.scripts]
gpg-backend-cli-host = "gpg_backend_cli_host.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools_scm]
fallback_version = "0.0.0+unknown"

[tool.uv.sources]
agent-auth-common = { workspace = true }
