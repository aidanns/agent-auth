[build-system]
requires = ["setuptools>=68.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[project]
name = "gpg-bridge"
dynamic = ["version"]
description = "HTTP bridge that delegates GPG signing to the host gpg binary for agent-auth-protected callers"
requires-python = ">=3.11"
dependencies = [
    # keep-sorted start
    "agent-auth-common",
    "pyyaml>=6.0",
    # keep-sorted end
]

[project.scripts]
gpg-bridge = "gpg_bridge.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools_scm]
fallback_version = "0.0.0+unknown"

[tool.uv.sources]
agent-auth-common = { workspace = true }
