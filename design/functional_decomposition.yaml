name: agent-auth
description: Token-based authorization system for gating AI agent access to host applications.
functions:
  - name: Token Management
    description: Create, store, and manage the lifecycle of access and refresh tokens.
    functions:
      - name: Create Token Pair
        description: Issue a new access token and refresh token with specified scopes and access tiers.
      - name: Refresh Token Pair
        description: Exchange a valid refresh token for a new access/refresh token pair, revoking the old refresh token.
      - name: Revoke Token Family
        description: Revoke all access and refresh tokens belonging to a token family.
      - name: Modify Token Family Scopes
        description: Add, remove, or change the access tier of scopes on an existing token family.
      - name: Rotate Token Family
        description: Revoke an existing token family and issue a new one with the same scopes.
      - name: Introspect Token
        description: Return metadata about a token including scopes, expiry, and family membership.
      - name: Detect Refresh Token Reuse
        description: Detect when a consumed refresh token is reused and revoke the entire token family.
  - name: Token Validation
    description: Verify token authenticity and check scope authorization.
    functions:
      - name: Verify Token Signature
        description: Validate the HMAC signature of a token against the signing key.
      - name: Check Token Expiry
        description: Verify that a token has not expired.
      - name: Check Scope Authorization
        description: Verify that a token carries the required scope for an operation.
      - name: Resolve Access Tier
        description: Determine whether a scope is allow, prompt, or deny for a given token.
  - name: JIT Approval
    description: Request and manage human approval for prompt-tier operations via a pluggable notification system.
    functions:
      - name: Request Approval
        description: Hold a request pending and POST the decision request to the configured out-of-process notifier URL to request user approval. The notifier is a separate HTTP endpoint specified by ``notification_plugin_url`` in agent-auth's configuration file.
      - name: POST Approval Request to Notifier
        description: Serialise the (family_id, scope, description) triple, POST it to ``notification_plugin_url``, parse the JSON response, and fail closed (deny) on timeout, connection error, non-2xx status, or malformed body.
      - name: Record Approval Grant
        description: Record an approval decision with its grant type (once or timed).
      - name: Check Existing Grant
        description: Check whether a prior approval grant covers the current request.
      - name: Expire Grants
        description: Remove approval grants whose time-boxed duration has elapsed.
  - name: Key Management
    description: Manage cryptographic keys stored in the system keyring.
    functions:
      - name: Generate Signing Key
        description: Generate a new HMAC signing key in the system keyring on first use.
      - name: Load Signing Key
        description: Load the HMAC signing key from the system keyring for token signing and verification.
      - name: Generate Encryption Key
        description: Generate a new AES-256-GCM encryption key in the system keyring on first use.
      - name: Load Encryption Key
        description: Load the encryption key from the system keyring for field-level encryption of sensitive database columns.
  - name: Token Store
    description: Persist token families and tokens in SQLite with field-level encryption for sensitive columns.
    functions:
      - name: Store Token Family
        description: Write a new token family record with its scopes (encrypted) to the database.
      - name: Store Token
        description: Write a new access or refresh token record to the database, encrypting the HMAC signature.
      - name: Mark Token Consumed
        description: Mark a refresh token as consumed after use.
      - name: Mark Family Revoked
        description: Mark a token family as revoked, invalidating all its tokens.
      - name: Query Tokens
        description: Read token and family records for validation, introspection, and listing, decrypting sensitive fields.
      - name: Encrypt Field
        description: Encrypt a column value using AES-256-GCM with the database encryption key.
      - name: Decrypt Field
        description: Decrypt a column value using AES-256-GCM with the database encryption key.
  - name: HTTP API
    description: Expose agent-auth functionality over HTTP for use by app bridges and CLIs. All endpoints are prefixed with /agent-auth/.
    functions:
      - name: Serve Validate Endpoint
        description: Handle POST /agent-auth/v1/validate requests from app bridges, including blocking for JIT approval on prompt-tier scopes.
      - name: Serve Refresh Endpoint
        description: Handle POST /agent-auth/v1/token/refresh requests from CLIs.
      - name: Serve Reissue Endpoint
        description: Handle POST /agent-auth/v1/token/reissue requests from CLIs when the refresh token has expired. Triggers JIT approval via the configured notification plugin.
      - name: Serve Status Endpoint
        description: Handle GET /agent-auth/v1/token/status requests for token introspection.
      - name: Serve Health Endpoint
        description: Handle GET /agent-auth/health liveness / readiness probes; require an access token carrying the agent-auth:health scope, return 200 when the token store is reachable, 401 / 403 on missing / unscoped tokens, and 503 when the store is unreachable.
      - name: Serve Metrics Endpoint
        description: Handle GET /agent-auth/metrics Prometheus scrape requests; require an access token carrying the agent-auth:metrics scope, return 200 with text/plain exposition on success and 401 / 403 on missing / unscoped tokens.
      - name: Serve Token Create Endpoint
        description: Handle POST /agent-auth/v1/token/create requests to create a new token family and return an access/refresh token pair.
      - name: Serve Token List Endpoint
        description: Handle GET /agent-auth/v1/token/list requests to return all token families and their scopes.
      - name: Serve Token Modify Endpoint
        description: Handle POST /agent-auth/v1/token/modify requests to add, remove, or change tiers on scopes of an existing token family.
      - name: Serve Token Revoke Endpoint
        description: Handle POST /agent-auth/v1/token/revoke requests to revoke a token family, invalidating all its tokens.
      - name: Serve Token Rotate Endpoint
        description: Handle POST /agent-auth/v1/token/rotate requests to revoke an existing token family and create a new one with the same scopes.
      - name: Bootstrap Management Token
        description: On server startup, check the OS keyring for a management refresh token; if absent or revoked, create a new agent-auth:manage=allow token family directly via the store and persist the refresh token to the keyring.
      - name: Handle Graceful Shutdown
        description: Install SIGTERM / SIGINT handlers that stop accepting new connections, drain in-flight requests within shutdown_deadline_seconds, checkpoint the token store WAL, and exit 0. A watchdog force-exits the process if drain exceeds the deadline.
  - name: Audit Logging
    description: Record all token operations and authorization decisions for security review.
    functions:
      - name: Log Token Operation
        description: Record token creation, refresh, reissue, revocation, rotation, and scope modification events.
      - name: Log Authorization Decision
        description: Record validation results including scope checks, tier resolutions, and JIT approval outcomes.
  - name: CLI Interface
    description: Provide command-line token management for the host user.
    functions:
      - name: Handle Token Create Command
        description: Parse arguments and invoke token pair creation.
      - name: Handle Token List Command
        description: Display all active token families and their scopes.
      - name: Handle Token Modify Command
        description: Parse arguments and invoke scope modification on an existing token family.
      - name: Handle Token Revoke Command
        description: Parse arguments and invoke token family revocation.
      - name: Handle Token Rotate Command
        description: Parse arguments and invoke token family rotation.
      - name: Handle Serve Command
        description: Start the agent-auth HTTP server.
      - name: Handle Management Token Show Command
        description: Retrieve the management refresh token from the OS keyring and print it (or surface a clean error and non-zero exit if the keyring is unavailable).
  - name: Things Bridge
    description: Expose authenticated Things 3 read operations over HTTP to the CLI client, delegating authorization to agent-auth.
    functions:
      - name: Delegate Token Validation
        description: Forward the bearer token to agent-auth for validation, scope checking, and any JIT approval before executing an operation.
      - name: Fetch Things Data
        description: Retrieve the todos, projects, or areas requested by the client, translating typed errors into the ThingsError hierarchy.
      - name: Serve Bridge HTTP API
        description: Expose Things 3 read operations as HTTP endpoints for the CLI client under the /things-bridge/ prefix.
      - name: Serve Bridge Health Endpoint
        description: Handle GET /things-bridge/health readiness probes; require an access token carrying the things-bridge:health scope, verify that the configured things_client_command is resolvable (with a short-lived cache to keep the probe cheap), return 200 when the bridge can reach its critical dependencies, 401 / 403 on missing / unscoped tokens, 502 when agent-auth is unreachable for probe authorization, and 503 when the things-client executable cannot be resolved.
      - name: Handle Bridge Graceful Shutdown
        description: Install SIGTERM / SIGINT handlers that stop accepting new connections, drain in-flight requests within shutdown_deadline_seconds, and exit 0. A watchdog force-exits the process if drain exceeds the deadline.
  - name: Things CLI
    description: Thin CLI client for interacting with Things 3 via the things-bridge, runnable from host or devcontainer.
    functions:
      - name: Send Bridge Request
        description: Send an authenticated HTTP request to the app bridge with the bearer token.
      - name: Auto Refresh Token
        description: Detect 401 responses, refresh the token pair via agent-auth, and retry the request. If the refresh token has expired, attempt re-issuance via JIT approval.
      - name: Store CLI Credentials
        description: Persist and load credentials using the system keyring (macOS Keychain or libsecret/gnome-keyring), with plaintext file fallback via --credential-store=file.
      - name: Handle App Commands
        description: Parse CLI arguments and map subcommands to bridge HTTP requests.
      - name: Display Results
        description: Format and print structured results from the bridge to the terminal.
