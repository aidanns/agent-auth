name: agent-auth
description: Token-based authorization system for gating AI agent access to host applications.
components:
  - name: agent-auth
    description: HTTP server and CLI for token lifecycle management, validation, and JIT approval running on the host.
    configuration_items:
      - name: agent-auth-server
        description: HTTP server and CLI service providing token lifecycle management, scope-based authorization, JIT approval, and audit logging.
        functions:
          - Create Token Pair
          - Refresh Token Pair
          - Revoke Token Family
          - Modify Token Family Scopes
          - Rotate Token Family
          - Introspect Token
          - Detect Refresh Token Reuse
          - Verify Token Signature
          - Check Token Expiry
          - Check Scope Authorization
          - Resolve Access Tier
          - Request Approval
          - POST Approval Request to Notifier
          - Record Approval Grant
          - Check Existing Grant
          - Expire Grants
          - Encrypt Field
          - Decrypt Field
          - Serve Validate Endpoint
          - Serve Refresh Endpoint
          - Serve Reissue Endpoint
          - Serve Status Endpoint
          - Serve Health Endpoint
          - Serve Metrics Endpoint
          - Serve Token Create Endpoint
          - Serve Token List Endpoint
          - Serve Token Modify Endpoint
          - Serve Token Revoke Endpoint
          - Serve Token Rotate Endpoint
          - Bootstrap Management Token
          - Handle Graceful Shutdown
          - Log Token Operation
          - Log Authorization Decision
          - Handle Token Create Command
          - Handle Token List Command
          - Handle Token Modify Command
          - Handle Token Revoke Command
          - Handle Token Rotate Command
          - Handle Serve Command
          - Handle Management Token Show Command
      - name: SQLite
        description: Third-party embedded relational database providing persistent storage for token families and tokens.
        functions:
          - Store Token Family
          - Store Token
          - Mark Token Consumed
          - Mark Family Revoked
          - Query Tokens
      - name: keyring
        description: Third-party Python library providing a unified API for accessing system keyring backends to store the HMAC signing key and AES-256-GCM encryption key.
        functions:
          - Generate Signing Key
          - Load Signing Key
          - Generate Encryption Key
          - Load Encryption Key
      - name: macOS Keychain
        description: Operating system keyring backend used to securely store the HMAC signing key and database encryption key on macOS.
        functions: []
      - name: gnome-keyring
        description: Operating system keyring backend (via libsecret/D-Bus Secret Service) used to securely store the HMAC signing key and database encryption key on Linux.
        functions: []
  - name: things-bridge
    description: HTTP server running on the host that exposes authenticated Things 3 read operations to the CLI client, delegating authorization to agent-auth. Contains no Things 3 logic itself.
    configuration_items:
      - name: things-bridge
        description: HTTP server service that maps /things-bridge/ endpoints onto the Things 3 read surface, delegating token validation to agent-auth.
        functions:
          - Delegate Token Validation
          - Fetch Things Data
          - Serve Bridge HTTP API
          - Serve Bridge Health Endpoint
          - Handle Bridge Graceful Shutdown
      - name: things-client-cli-applescript
        description: Read-only CLI shipped with the distribution that answers todos / projects / areas sub-commands by running AppleScript via osascript. The bridge's default things_client_command.
        functions: []
  - name: install.sh
    description: One-line installer script that installs all user-facing CLIs (agent-auth, things-bridge, things-cli, things-client-cli-applescript) into a uv-managed tool environment.
    configuration_items:
      - name: install.sh
        description: Shell script at the repo root; invoked via curl | bash. Checks for uv, then runs uv tool install to fetch and install the package from GitHub.
        functions: []
  - name: things-cli
    description: Thin CLI client for interacting with Things 3 via the things-bridge, runnable from host or devcontainer.
    configuration_items:
      - name: things-cli
        description: CLI client service that sends authenticated HTTP requests to the things-bridge, with automatic token refresh and re-issuance on 401 responses.
        functions:
          - Send Bridge Request
          - Auto Refresh Token
          - Store CLI Credentials
          - Handle App Commands
          - Display Results
      - name: keyring
        description: Third-party Python library providing a unified API for accessing system keyring backends to store CLI credentials.
        functions: []
      - name: macOS Keychain
        description: Operating system keyring backend used to securely store CLI credentials on macOS.
        functions: []
      - name: gnome-keyring
        description: Operating system keyring backend (via libsecret/D-Bus Secret Service) used to securely store CLI credentials on Linux.
        functions: []
