[build-system]
requires = ["setuptools>=68.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-auth"
dynamic = ["version"]
description = "Token-based authorization for AI agent access to macOS applications"
requires-python = ">=3.11"
dependencies = [
    # keep-sorted start
    "cryptography>=42.0",
    "keyring>=25.0",
    "pyyaml>=6.0",
    # keep-sorted end
]

[project.optional-dependencies]
dev = [
    # keep-sorted start
    "build>=1.0",
    "mypy>=1.20",
    "pip-audit>=2.7",
    "pyright>=1.1.408",
    "pytest>=8.0",
    "reuse>=4.0",
    "testcontainers[compose]>=4",
    # keep-sorted end
]

[project.scripts]
# keep-sorted start
agent-auth = "agent_auth.cli:main"
things-bridge = "things_bridge.cli:main"
things-cli = "things_cli.cli:main"
things-client-cli-applescript = "things_client_applescript.cli:main"
# keep-sorted end

[tool.setuptools.packages.find]
where = ["src"]
# ``tests_support`` ships the always-approve / always-deny notification
# plugins used by the Docker integration tests. It lives under ``src/``
# for ergonomic in-tree development but must never enter the distributed
# wheel — a misconfigured production ``notification_plugin`` setting
# could otherwise load ``AlwaysApprovePlugin`` by name. The integration
# container imports it via ``PYTHONPATH`` instead of an installed
# distribution (see ``docker/Dockerfile.test``).
exclude = ["tests_support*"]

[tool.setuptools_scm]
# Versions are derived from git tags (e.g. a ``v0.2.0`` tag produces
# ``0.2.0``). Untagged commits get a development version like
# ``0.2.1.dev5+g1234abc``.
fallback_version = "0.0.0+unknown"

[tool.pip-audit]
# List known-acceptable advisories here with a comment explaining why each
# is acceptable. pip-audit accepts identifiers from multiple databases. Examples:
#   ignore-vuln = ["PYSEC-2024-12345"]     # PYSEC advisory
#   ignore-vuln = ["GHSA-xxxx-xxxx-xxxx"]  # GitHub Security Advisory
ignore-vuln = []

[tool.pytest.ini_options]
# ``tests_support`` is deliberately excluded from the ``agent-auth``
# wheel (see ``[tool.setuptools.packages.find]``) so it can never ship
# in a production install. Tests still need to import it from the
# source tree, so add ``src/`` to the pytest pythonpath.
pythonpath = ["src"]
markers = [
    "covers_function(*names): declare which functional-decomposition leaf functions a test exercises (read by `systems-engineering function verify`)",
]

[tool.ruff]
src = ["src", "tests"]
target-version = "py311"
# 100-character soft limit. Ruff's default is 88; 100 better fits
# descriptive error messages and SQL strings already common in this
# codebase without forcing wraps that reduce readability.
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]

# Type-checking configuration. Two checkers run in CI (see
# .claude/instructions/python.md): mypy for Python-standard semantics,
# pyright for a second implementation catching disjoint issues. The
# project-wide default is strict; modules that existed before strict
# was introduced are relaxed below via `ignore_errors = true` and
# paired with a ratcheting follow-up issue.
#
# Every module listed with `ignore_errors = true` below must also
# appear as a path in pyrightconfig.json's `ignore` list. Renames and
# deletions MUST touch both files. scripts/verify-standards.sh asserts
# the two lists agree.
[tool.mypy]
python_version = "3.11"
strict = true
# Point mypy at both trees. CLI invocation stays `mypy src tests`.
files = ["src", "tests"]

# Third-party imports without type stubs. These are separately
# addressed by pulling in types-* packages as they become available;
# tracked in the ratchet issues.
[[tool.mypy.overrides]]
module = [
    # keep-sorted start
    "keyring",
    "keyring.*",
    "testcontainers",
    "testcontainers.*",
    "yaml",
    # keep-sorted end
]
ignore_missing_imports = true

# Ratchet targets — agent_auth/*. Each listed module currently fails
# strict mode; see #145 for the per-module fix list.
[[tool.mypy.overrides]]
module = [
    # keep-sorted start
    "agent_auth.approval",
    "agent_auth.audit",
    "agent_auth.cli",
    "agent_auth.config",
    "agent_auth.plugins",
    "agent_auth.server",
    "agent_auth.store",
    "agent_auth.tokens",
    # keep-sorted end
]
ignore_errors = true

# Ratchet targets — things_bridge/*. See #146.
[[tool.mypy.overrides]]
module = [
    # keep-sorted start
    "things_bridge.cli",
    "things_bridge.config",
    "things_bridge.server",
    "things_bridge.things_client",
    # keep-sorted end
]
ignore_errors = true

# Ratchet targets — things_cli/* + things_client_common/* +
# things_models/*. See #147.
[[tool.mypy.overrides]]
module = [
    # keep-sorted start
    "things_cli.cli",
    "things_cli.client",
    "things_cli.credentials",
    "things_cli.output",
    "things_client_common.cli",
    "things_models.models",
    # keep-sorted end
]
ignore_errors = true

# Tests use pytest fixture magic and parametrize decorators heavily;
# `disallow_untyped_defs` in particular produces a large amount of
# low-value noise on test functions. Tracked for ratcheting in #148.
[[tool.mypy.overrides]]
module = [
    # keep-sorted start
    "tests.*",
    "tests_support.*",
    # keep-sorted end
]
ignore_errors = true
