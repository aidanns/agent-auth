[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-auth"
version = "0.1.0"
description = "Token-based authorization for AI agent access to macOS applications"
requires-python = ">=3.11"
dependencies = [
    "keyring>=25.0",
    "cryptography>=42.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[project.scripts]
agent-auth = "agent_auth.cli:main"

[tool.pytest.ini_options]
markers = [
    "covers_function(*names): declare which functional-decomposition leaf functions a test exercises (read by `systems-engineering function verify`)",
]
