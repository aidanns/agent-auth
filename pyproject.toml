[build-system]
requires = ["setuptools>=68.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-auth"
dynamic = ["version"]
description = "Token-based authorization for AI agent access to macOS applications"
requires-python = ">=3.11"
dependencies = [
    "keyring>=25.0",
    "cryptography>=42.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "build>=1.0",
    "pytest>=8.0",
]

[project.scripts]
agent-auth = "agent_auth.cli:main"
things-bridge = "things_bridge.cli:main"
things-cli = "things_cli.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools_scm]
# Versions are derived from git tags (e.g. a ``v0.2.0`` tag produces
# ``0.2.0``). Untagged commits get a development version like
# ``0.2.1.dev5+g1234abc``.
fallback_version = "0.0.0+unknown"

[tool.pytest.ini_options]
markers = [
    "covers_function(*names): declare which functional-decomposition leaf functions a test exercises (read by `systems-engineering function verify`)",
]
