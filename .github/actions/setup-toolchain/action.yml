name: Setup Toolchain
description: Install all CI tooling and verify dependencies

inputs:
  github-token:
    description: GitHub token used for authenticated downloads during toolchain install (avoids per-IP rate limits on raw.githubusercontent.com and the release-asset endpoint)
    required: true

runs:
  using: composite
  steps:
    # Single source of truth for every pinned tool version lives in
    # .github/tool-versions.yaml. Emit one step output per value this
    # composite action consumes so downstream install steps reference
    # the manifest rather than duplicating literals. yq is pre-installed
    # on GitHub-hosted runner images.
    - name: Read tool-versions manifest
      id: versions
      shell: bash
      env:
        MANIFEST: .github/tool-versions.yaml
      run: |
        set -euo pipefail
        emit() {
          local name="$1" path="$2"
          local value
          value="$(yq -r "${path}" "${MANIFEST}")"
          if [[ -z "${value}" || "${value}" == "null" ]]; then
            echo "setup-toolchain: ${MANIFEST} missing ${path}" >&2
            exit 1
          fi
          echo "${name}=${value}" >> "$GITHUB_OUTPUT"
        }
        emit go-task-version            '.["go-task"].version'
        emit uv-version                 '.uv.version'
        emit keep-sorted-version        '.["keep-sorted"].version'
        emit keep-sorted-sha256         '.["keep-sorted"].sha256_linux_x86_64'
        emit mdformat-version           '.mdformat.version'
        emit mdformat-gfm-version       '.["mdformat-gfm"].version'
        emit mdformat-tables-version    '.["mdformat-tables"].version'
        emit shellcheck-version         '.shellcheck.version'
        emit shellcheck-sha256          '.shellcheck.sha256_linux_x86_64'
        emit ripsecrets-version         '.ripsecrets.version'
        emit ripsecrets-sha256          '.ripsecrets.sha256_linux_x86_64'
        emit ruff-version               '.ruff.version'
        emit ruff-sha256                '.ruff.sha256_linux_x86_64'
        emit shfmt-version              '.shfmt.version'
        emit shfmt-sha256               '.shfmt.sha256_linux_x86_64'
        emit taplo-version              '.taplo.version'
        emit taplo-sha256               '.taplo.sha256_linux_x86_64'
        emit treefmt-version            '.treefmt.version'
        emit treefmt-sha256             '.treefmt.sha256_linux_x86_64'
        emit systems-engineering-ref              '.["systems-engineering"].ref'
        emit systems-engineering-install-sha256   '.["systems-engineering"].install_sha256'
        emit d2-version                           '.d2.version'
        emit d2-sha256                            '.d2.sha256_linux_x86_64'

    - name: Install uv
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      with:
        version: ${{ steps.versions.outputs.uv-version }}
        enable-cache: true

    - name: Install systems-engineering
      shell: bash
      env:
        SYSTEMS_ENGINEERING_REF: ${{ steps.versions.outputs.systems-engineering-ref }}
        SYSTEMS_ENGINEERING_INSTALL_SHA256: ${{ steps.versions.outputs.systems-engineering-install-sha256 }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        # Same shape as the d2 step: download to /tmp, verify against a
        # manifest-pinned sha256, only then execute. The ref field alone
        # doesn't gate execution — an install.sh edit at that ref would
        # still run unchecked without this verify. See #157.
        #
        # Fetches via the Contents API with a custom Accept header so
        # can't use scripts/ci/fetch-release-asset.sh which targets the
        # releases endpoint.
        set -euo pipefail
        curl -fsSL --retry 5 --retry-max-time 60 --retry-all-errors \
          -H "Accept: application/vnd.github.raw" \
          -H "Authorization: Bearer ${GITHUB_TOKEN}" \
          -o /tmp/systems-engineering-install.sh \
          "https://api.github.com/repos/aidanns/systems-engineering/contents/install.sh?ref=${SYSTEMS_ENGINEERING_REF}"

        echo "${SYSTEMS_ENGINEERING_INSTALL_SHA256}  /tmp/systems-engineering-install.sh" | sha256sum -c -

        bash /tmp/systems-engineering-install.sh
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Install go-task
      uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
      with:
        version: ${{ steps.versions.outputs.go-task-version }}
        repo-token: ${{ inputs.github-token }}

    - name: Install mdformat
      shell: bash
      env:
        MDFORMAT_VERSION: ${{ steps.versions.outputs.mdformat-version }}
        MDFORMAT_GFM_VERSION: ${{ steps.versions.outputs.mdformat-gfm-version }}
        MDFORMAT_TABLES_VERSION: ${{ steps.versions.outputs.mdformat-tables-version }}
      run: |
        uv tool install \
          "mdformat==${MDFORMAT_VERSION}" \
          --with "mdformat-gfm==${MDFORMAT_GFM_VERSION}" \
          --with "mdformat-tables==${MDFORMAT_TABLES_VERSION}"
        mdformat --version

    - name: Install release binaries
      shell: bash
      env:
        D2_VERSION: ${{ steps.versions.outputs.d2-version }}
        D2_SHA256: ${{ steps.versions.outputs.d2-sha256 }}
        KEEP_SORTED_VERSION: ${{ steps.versions.outputs.keep-sorted-version }}
        KEEP_SORTED_SHA256: ${{ steps.versions.outputs.keep-sorted-sha256 }}
        RIPSECRETS_VERSION: ${{ steps.versions.outputs.ripsecrets-version }}
        RIPSECRETS_SHA256: ${{ steps.versions.outputs.ripsecrets-sha256 }}
        RUFF_VERSION: ${{ steps.versions.outputs.ruff-version }}
        RUFF_SHA256: ${{ steps.versions.outputs.ruff-sha256 }}
        SHELLCHECK_VERSION: ${{ steps.versions.outputs.shellcheck-version }}
        SHELLCHECK_SHA256: ${{ steps.versions.outputs.shellcheck-sha256 }}
        SHFMT_VERSION: ${{ steps.versions.outputs.shfmt-version }}
        SHFMT_SHA256: ${{ steps.versions.outputs.shfmt-sha256 }}
        TAPLO_VERSION: ${{ steps.versions.outputs.taplo-version }}
        TAPLO_SHA256: ${{ steps.versions.outputs.taplo-sha256 }}
        TREEFMT_VERSION: ${{ steps.versions.outputs.treefmt-version }}
        TREEFMT_SHA256: ${{ steps.versions.outputs.treefmt-sha256 }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        # Composite-action steps run sequentially, so the 7 independent
        # release-binary downloads (~tens of MB each) are the one place
        # where cross-step concurrency can be recovered. Fire them all as
        # background jobs, redirect each child's combined output to a
        # per-tool log so the 7 streams don't interleave, then replay
        # each log inside its own `::group::` from the wait loop. Plain
        # `wait` with no arg reports only the last job's exit code, so
        # wait on each PID individually and accumulate failures. See
        # #168.
        declare -A pids=()
        scripts/ci/fetch-release-asset.sh \
          "https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz" \
          /tmp/shellcheck.tar.xz \
          "${SHELLCHECK_SHA256}" >/tmp/shellcheck.fetch.log 2>&1 &
        pids[shellcheck]=$!
        scripts/ci/fetch-release-asset.sh \
          "https://github.com/mvdan/sh/releases/download/v${SHFMT_VERSION}/shfmt_v${SHFMT_VERSION}_linux_amd64" \
          /tmp/shfmt \
          "${SHFMT_SHA256}" >/tmp/shfmt.fetch.log 2>&1 &
        pids[shfmt]=$!
        scripts/ci/fetch-release-asset.sh \
          "https://github.com/astral-sh/ruff/releases/download/${RUFF_VERSION}/ruff-x86_64-unknown-linux-gnu.tar.gz" \
          /tmp/ruff.tar.gz \
          "${RUFF_SHA256}" >/tmp/ruff.fetch.log 2>&1 &
        pids[ruff]=$!
        scripts/ci/fetch-release-asset.sh \
          "https://github.com/tamasfe/taplo/releases/download/${TAPLO_VERSION}/taplo-linux-x86_64.gz" \
          /tmp/taplo.gz \
          "${TAPLO_SHA256}" >/tmp/taplo.fetch.log 2>&1 &
        pids[taplo]=$!
        scripts/ci/fetch-release-asset.sh \
          "https://github.com/google/keep-sorted/releases/download/v${KEEP_SORTED_VERSION}/keep-sorted_linux" \
          /tmp/keep-sorted \
          "${KEEP_SORTED_SHA256}" >/tmp/keep-sorted.fetch.log 2>&1 &
        pids[keep-sorted]=$!
        scripts/ci/fetch-release-asset.sh \
          "https://github.com/sirwart/ripsecrets/releases/download/v${RIPSECRETS_VERSION}/ripsecrets-${RIPSECRETS_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
          /tmp/ripsecrets.tar.gz \
          "${RIPSECRETS_SHA256}" >/tmp/ripsecrets.fetch.log 2>&1 &
        pids[ripsecrets]=$!
        scripts/ci/fetch-release-asset.sh \
          "https://github.com/numtide/treefmt/releases/download/v${TREEFMT_VERSION}/treefmt_${TREEFMT_VERSION}_linux_amd64.tar.gz" \
          /tmp/treefmt.tar.gz \
          "${TREEFMT_SHA256}" >/tmp/treefmt.fetch.log 2>&1 &
        pids[treefmt]=$!
        scripts/ci/fetch-release-asset.sh \
          "https://github.com/terrastruct/d2/releases/download/v${D2_VERSION}/d2-v${D2_VERSION}-linux-amd64.tar.gz" \
          /tmp/d2.tar.gz \
          "${D2_SHA256}" >/tmp/d2.fetch.log 2>&1 &
        pids[d2]=$!

        # Iterate a fixed tool list (not "${!pids[@]}") so the replayed
        # log order is deterministic across runs.
        fail=0
        for tool in shellcheck shfmt ruff taplo keep-sorted ripsecrets treefmt d2; do
          if wait "${pids[$tool]}"; then
            status=OK
          else
            status=FAILED
            fail=1
          fi
          echo "::group::Download ${tool} (${status})"
          cat "/tmp/${tool}.fetch.log"
          echo "::endgroup::"
        done
        [[ $fail -eq 0 ]]

        echo "::group::Install shellcheck"
        tar -xJf /tmp/shellcheck.tar.xz -C /tmp
        sudo install -m0755 "/tmp/shellcheck-v${SHELLCHECK_VERSION}/shellcheck" /usr/local/bin/shellcheck
        shellcheck --version
        echo "::endgroup::"

        echo "::group::Install shfmt"
        sudo install -m0755 /tmp/shfmt /usr/local/bin/shfmt
        shfmt --version
        echo "::endgroup::"

        echo "::group::Install ruff"
        tar -xzf /tmp/ruff.tar.gz -C /tmp
        sudo install -m0755 /tmp/ruff-x86_64-unknown-linux-gnu/ruff /usr/local/bin/ruff
        ruff --version
        echo "::endgroup::"

        echo "::group::Install taplo"
        gunzip -f /tmp/taplo.gz
        sudo install -m0755 /tmp/taplo /usr/local/bin/taplo
        taplo --version
        echo "::endgroup::"

        echo "::group::Install keep-sorted"
        sudo install -m0755 /tmp/keep-sorted /usr/local/bin/keep-sorted
        keep-sorted --version
        echo "::endgroup::"

        echo "::group::Install ripsecrets"
        tar -xzf /tmp/ripsecrets.tar.gz -C /tmp
        sudo install -m0755 "/tmp/ripsecrets-${RIPSECRETS_VERSION}-x86_64-unknown-linux-gnu/ripsecrets" /usr/local/bin/ripsecrets
        ripsecrets --version
        echo "::endgroup::"

        echo "::group::Install treefmt"
        tar -xzf /tmp/treefmt.tar.gz -C /tmp
        sudo install -m0755 /tmp/treefmt /usr/local/bin/treefmt
        treefmt --version
        echo "::endgroup::"

        echo "::group::Install d2"
        tar -xzf /tmp/d2.tar.gz -C /tmp
        sudo install -m0755 "/tmp/d2-v${D2_VERSION}/bin/d2" /usr/local/bin/d2
        d2 --version
        echo "::endgroup::"

    - name: Verify Required Tooling
      shell: bash
      run: task verify-dependencies
