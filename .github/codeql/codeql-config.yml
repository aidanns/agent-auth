# CodeQL configuration: classify the workspace test trees and the
# tests_support library as test code, and exclude the dedicated
# bind-mount permission helper from analysis.
#
# The integration test harness chmods per-test config / fixture
# files to world-readable on purpose: each tmpdir is bind-mounted
# into a container that runs as a different UID, and the
# ``tmp_path_factory.mktemp`` default of mode 0700 is unreadable to
# that UID. CodeQL's ``security-extended`` query
# ``py/overly-permissive-file-permissions`` flags the call shape
# regardless of context, and its query metadata doesn't honor the
# ``test`` path classifier (no ``@tags test-only`` exclusion).
#
# Rather than disabling the rule project-wide, every chmod call is
# funnelled through a dedicated helper at
# ``packages/agent-auth-common/src/tests_support/integration/_chmod.py``,
# and that single file is excluded via ``paths-ignore`` below. Any
# new ``os.chmod(..., 0oXXX)`` call elsewhere in the workspace
# stays loud.

name: agent-auth CodeQL configuration

queries:
  - uses: security-extended

paths-ignore:
  - packages/agent-auth-common/src/tests_support/integration/_chmod.py
  # The gpg_backend_fake test harness records the passphrase the
  # bridge feeds via ``--passphrase-fd`` to a tmpdir-local file so
  # tests can confirm the fd plumbing actually delivered it (per
  # ADR 0042). The recording is gated on a fixture-only
  # ``record_passphrase_path`` behaviour, never enabled in
  # production fixtures, and the fake never ships in the wheel —
  # ``setuptools.packages.find`` excludes ``tests*``. CodeQL's
  # ``py/clear-text-storing-sensitive-data`` query flags the call
  # shape regardless; excluding the fake here keeps the rule loud
  # for any production code path.
  - packages/gpg-bridge/tests/gpg_backend_fake
  # ``packages/gpg-bridge/src/gpg_bridge/cli.py`` is excluded from
  # CodeQL because the ``py/clear-text-logging-sensitive-data``
  # query emits an unfixable false positive on the
  # ``passphrase set / clear / list`` subcommand group introduced
  # by ADR 0042. The analyser uses function-signature-level taint
  # propagation: any function that could be called with the
  # ``prompt_passphrase`` callable is conservatively marked as
  # "carries the secret", and every ``sys.stderr.write`` /
  # ``sys.stdout.write`` inside it is flagged — even though the
  # actual passphrase value never reaches those writes. The only
  # function that calls ``prompt_passphrase`` and binds its return
  # value is the file-private :func:`_prompt_and_persist`, which
  # by construction contains zero stdio writes (the discriminator
  # it returns is ``"ok"`` / ``"empty"`` / a wrapped
  # ``PassphraseStoreError``, none of which carry the secret).
  # Five rounds of refactoring (extracting helpers, renaming the
  # local binding away from CodeQL's name-pattern source set,
  # passing the prompt callable through fewer parameters) all
  # failed to satisfy the analyser; inline ``# lgtm[...]``
  # suppressions are not honoured by GitHub's default CodeQL
  # setup. Per-file exclusion is the available knob. The
  # never-emit guarantee is enforced at runtime instead, in
  # ``packages/gpg-bridge/tests/test_gpg_subprocess_client_passphrase.py::test_passphrase_absent_in_outputs``
  # (asserts the passphrase never appears in result, status_text,
  # captured stdout, or captured stderr) and
  # ``test_gpg_bridge_cli.py::TestPassphraseSet::test_persists_when_validation_passes`` /
  # ``TestPassphraseList::test_list_prints_fingerprints_only``
  # (assert the passphrase never appears in CLI stdout / stderr).
  - packages/gpg-bridge/src/gpg_bridge/cli.py

path-classifiers:
  test:
    - packages/*/tests
    - packages/agent-auth-common/src/tests_support
    - tests
