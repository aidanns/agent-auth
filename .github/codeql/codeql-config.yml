# CodeQL configuration: classify the workspace test trees and the
# tests_support library as test code, and exclude the dedicated
# bind-mount permission helper from analysis.
#
# The integration test harness chmods per-test config / fixture
# files to world-readable on purpose: each tmpdir is bind-mounted
# into a container that runs as a different UID, and the
# ``tmp_path_factory.mktemp`` default of mode 0700 is unreadable to
# that UID. CodeQL's ``security-extended`` query
# ``py/overly-permissive-file-permissions`` flags the call shape
# regardless of context, and its query metadata doesn't honor the
# ``test`` path classifier (no ``@tags test-only`` exclusion).
#
# Rather than disabling the rule project-wide, every chmod call is
# funnelled through a dedicated helper at
# ``packages/agent-auth-common/src/tests_support/integration/_chmod.py``,
# and that single file is excluded via ``paths-ignore`` below. Any
# new ``os.chmod(..., 0oXXX)`` call elsewhere in the workspace
# stays loud.

name: agent-auth CodeQL configuration

queries:
  - uses: security-extended

paths-ignore:
  - packages/agent-auth-common/src/tests_support/integration/_chmod.py
  # The gpg_backend_fake test harness records the passphrase the
  # bridge feeds via ``--passphrase-fd`` to a tmpdir-local file so
  # tests can confirm the fd plumbing actually delivered it (per
  # ADR 0042). The recording is gated on a fixture-only
  # ``record_passphrase_path`` behaviour, never enabled in
  # production fixtures, and the fake never ships in the wheel —
  # ``setuptools.packages.find`` excludes ``tests*``. CodeQL's
  # ``py/clear-text-storing-sensitive-data`` query flags the call
  # shape regardless; excluding the fake here keeps the rule loud
  # for any production code path.
  - packages/gpg-bridge/tests/gpg_backend_fake

path-classifiers:
  test:
    - packages/*/tests
    - packages/agent-auth-common/src/tests_support
    - tests
