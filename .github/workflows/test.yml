name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Shared across every integration-* job: the composite build action and
# the pytest session resolve every per-service image at ``<svc>-test:ci``
# via this shared session suffix. Each job still builds its own copy of
# every image today (caching is tracked under issue #129).
env:
  AGENT_AUTH_TEST_IMAGE_SESSION: ci

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-toolchain
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run unit tests
        run: task test -- --unit

  integration-agent-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-toolchain
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/build-integration-test-image
        with:
          session: ${{ env.AGENT_AUTH_TEST_IMAGE_SESSION }}

      - name: Run agent-auth integration tests
        run: task test -- --integration agent-auth

  integration-things-bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-toolchain
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/build-integration-test-image
        with:
          session: ${{ env.AGENT_AUTH_TEST_IMAGE_SESSION }}

      - name: Run things-bridge integration tests
        run: task test -- --integration things-bridge

  integration-gpg-bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-toolchain
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/build-integration-test-image
        with:
          session: ${{ env.AGENT_AUTH_TEST_IMAGE_SESSION }}

      - name: Run gpg-bridge integration tests
        run: task test -- --integration gpg-bridge

  integration-things-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-toolchain
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/build-integration-test-image
        with:
          session: ${{ env.AGENT_AUTH_TEST_IMAGE_SESSION }}

      - name: Run things-cli integration tests
        run: task test -- --integration things-cli

  integration-things-client-applescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-toolchain
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/build-integration-test-image
        with:
          session: ${{ env.AGENT_AUTH_TEST_IMAGE_SESSION }}

      - name: Run things-client-applescript integration tests
        run: task test -- --integration things-client-applescript

  # macOS-only job that exercises the real osascript path shipped in
  # things-client-cli-applescript. The rest of the suite runs against a
  # FakeRunner on Linux; this job guards against the failure modes that
  # only show up when the emitted AppleScript is actually compiled —
  # invalid helper syntax, osascript error-message wording that breaks
  # our stderr parsing, subprocess-level timeout handling. A real
  # Things 3 instance + Automation permissions are not available on
  # GitHub's hosted macOS runners, so the few ``@_requires_things3``
  # e2e tests auto-skip here; driving the full bridge + AppleScript CLI
  # against a live Things database is tracked as a follow-up.
  #
  # Minimal toolchain: this job deliberately does NOT reuse
  # .github/actions/setup-toolchain (which hard-codes Linux asset URLs
  # for every release binary). The Darwin-gated suite only needs uv +
  # the project venv + osascript (pre-installed on GitHub's macOS
  # runner), so we bootstrap that directly.
  macos-applescript:
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.7"
          enable-cache: true

      - name: Sync venv
        run: uv sync --extra dev

      - name: Run Darwin-gated AppleScript client tests
        run: uv run pytest packages/things-client-cli-applescript/tests/test_things_client_applescript_things.py --no-cov -v

  tests:
    runs-on: ubuntu-latest
    needs:
      - unit
      - integration-agent-auth
      - integration-gpg-bridge
      - integration-things-bridge
      - integration-things-cli
      - integration-things-client-applescript
      - macos-applescript
    if: always()
    steps:
      - name: Aggregate test results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" \
             || "${{ contains(needs.*.result, 'cancelled') }}" == "true" \
             || "${{ contains(needs.*.result, 'skipped') }}" == "true" ]]; then
            echo "results: ${{ toJSON(needs.*.result) }}"
            exit 1
          fi
