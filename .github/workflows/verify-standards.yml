name: Verify Standards

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-standards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-toolchain
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Project Standards
        run: task verify-standards
