name: Verify Standards

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-standards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install go-task
        uses: arduino/setup-task@v2
        with:
          version: 3.50.0
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Taskfile exposes required tasks
        run: scripts/verify-standards.sh
