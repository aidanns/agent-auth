name: Typecheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-toolchain
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run mypy + pyright
        run: task typecheck
