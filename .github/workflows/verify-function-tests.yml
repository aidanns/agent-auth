name: Verify Function Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-function-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-toolchain
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # continue-on-error until aidanns/agent-auth#5 is resolved: the
      # check currently reports 37/47 leaf functions covered, so it
      # would block every PR. Remove once coverage reaches 100%.
      - name: Verify all functions have test coverage
        continue-on-error: true
        run: task verify-function-tests
