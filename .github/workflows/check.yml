name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-toolchain
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run lint + format --check
        run: task check

      - name: Run treefmt --ci
        # `task check` invokes the per-language formatters directly via
        # scripts/lint.sh + scripts/format.sh, so it doesn't exercise
        # treefmt.toml itself. This step catches a broken or stale
        # treefmt.toml (missing formatter entry, wrong includes, drift
        # from the per-tool configs) that the direct path would miss.
        run: treefmt --ci

      - name: Run ripsecrets
        # Scan the full tree for committed secrets. Lefthook only catches
        # staged content; this gate catches anything that lands on a branch
        # by some other path (force-push, web edit, merge from a fork).
        # `.secretsignore` excludes generated SVGs whose embedded base64
        # font data trips the high-entropy heuristic.
        run: ripsecrets
