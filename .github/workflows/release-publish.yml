# Verification recipe: see SECURITY.md § Supply-chain artifacts.

name: Release Publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      # base64-encoded sha256 digests of the sdist + wheel, fed to the
      # SLSA generator reusable workflow to bind the provenance
      # attestation to these exact artefacts.
      hashes: ${{ steps.hashes.outputs.hashes }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.7"
          enable-cache: true

      - name: Build sdist and wheel
        run: uv build

      - name: Resolve artefact filenames
        id: artefacts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s failglob
          sdist=(dist/*.tar.gz)
          wheel=(dist/*.whl)
          echo "sdist=${sdist[0]}" >> "${GITHUB_OUTPUT}"
          echo "wheel=${wheel[0]}" >> "${GITHUB_OUTPUT}"
          echo "sdist_sbom=${sdist[0]}.spdx.json" >> "${GITHUB_OUTPUT}"
          echo "wheel_sbom=${wheel[0]}.spdx.json" >> "${GITHUB_OUTPUT}"

      - name: Generate SPDX SBOM for sdist
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          file: ${{ steps.artefacts.outputs.sdist }}
          format: spdx-json
          output-file: ${{ steps.artefacts.outputs.sdist_sbom }}
          upload-release-assets: false
          upload-artifact: false

      - name: Generate SPDX SBOM for wheel
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          file: ${{ steps.artefacts.outputs.wheel }}
          format: spdx-json
          output-file: ${{ steps.artefacts.outputs.wheel_sbom }}
          upload-release-assets: false
          upload-artifact: false

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign artefacts and SBOMs (keyless)
        shell: bash
        env:
          SDIST: ${{ steps.artefacts.outputs.sdist }}
          WHEEL: ${{ steps.artefacts.outputs.wheel }}
          SDIST_SBOM: ${{ steps.artefacts.outputs.sdist_sbom }}
          WHEEL_SBOM: ${{ steps.artefacts.outputs.wheel_sbom }}
        run: |
          set -euo pipefail
          for f in "${SDIST}" "${WHEEL}" "${SDIST_SBOM}" "${WHEEL_SBOM}"; do
            cosign sign-blob --yes --bundle "${f}.sig.bundle" "${f}"
          done

      - name: Compute artefact hashes for SLSA provenance
        id: hashes
        shell: bash
        env:
          SDIST: ${{ steps.artefacts.outputs.sdist }}
          WHEEL: ${{ steps.artefacts.outputs.wheel }}
        run: |
          set -euo pipefail
          # The SLSA generator expects `base64(sha256sum basename1 basename2)`.
          # Use basenames (not the `dist/…` path) so the provenance subjects
          # match what consumers see on the release page.
          cd "$(dirname "${SDIST}")"
          echo "hashes=$(sha256sum "$(basename "${SDIST}")" "$(basename "${WHEEL}")" | base64 -w0)" >> "${GITHUB_OUTPUT}"

      - name: Upload artefacts to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          SDIST: ${{ steps.artefacts.outputs.sdist }}
          WHEEL: ${{ steps.artefacts.outputs.wheel }}
          SDIST_SBOM: ${{ steps.artefacts.outputs.sdist_sbom }}
          WHEEL_SBOM: ${{ steps.artefacts.outputs.wheel_sbom }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${TAG}" \
            "${SDIST}" "${SDIST}.sig.bundle" \
            "${WHEEL}" "${WHEEL}.sig.bundle" \
            "${SDIST_SBOM}" "${SDIST_SBOM}.sig.bundle" \
            "${WHEEL_SBOM}" "${WHEEL_SBOM}.sig.bundle" \
            --clobber

  # SLSA Level 3 build provenance attestation. The reusable workflow runs
  # on GitHub's isolated generator runners (not our `publish` runner) so
  # the provenance cannot be forged by a malicious step in `publish`. The
  # generator uploads `multiple.intoto.jsonl` to the release alongside the
  # signed artefacts; verification uses `slsa-verifier verify-artifact`
  # (see SECURITY.md § Supply-chain artifacts).
  #
  # Exception to the SHA-pin policy in
  # `.claude/instructions/tooling-and-ci.md`: slsa-github-generator's
  # reusable workflow MUST be referenced by tag, not commit SHA — the
  # workflow introspects its own `@ref` to certify the builder identity in
  # the emitted provenance. See
  # https://github.com/slsa-framework/slsa-github-generator/blob/main/internal/builders/generic/README.md#referencing-the-slsa-generator.
  provenance:
    needs: [publish]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.publish.outputs.hashes }}
      upload-assets: true
