# Run `task --list` to see every repeatable operation. See CONTRIBUTING.md.

version: "3"

tasks:
  test:
    desc: Run the pytest suite inside the project virtualenv.
    cmds:
      - scripts/test.sh {{.CLI_ARGS}}

  benchmark:
    desc: Run the pytest-benchmark suite under benchmarks/. See benchmarks/README.md for the regression threshold and baseline refresh procedure.
    cmds:
      - scripts/benchmark.sh {{.CLI_ARGS}}

  lint:
    desc: Run all configured linters.
    cmds:
      - scripts/lint.sh

  format:
    desc: Run all configured formatters. Pass `-- --check` for diff-only mode.
    cmds:
      - scripts/format.sh {{.CLI_ARGS}}

  check:
    desc: Run all linters, assert formatting, and verify integration-test isolation.
    cmds:
      - scripts/lint.sh
      - scripts/format.sh --check
      - scripts/verify-integration-isolation.sh

  typecheck:
    desc: Run mypy + pyright on every packages/<svc>/src tree and tests/.
    cmds:
      - scripts/typecheck.sh

  verify-design:
    desc: Verify every leaf function in the functional decomposition is allocated in the product breakdown AND that design/ rendered artefacts (.md, .csv, .d2, .png, .svg) match the yaml.
    cmds:
      - scripts/verify-design.sh

  design:generate:
    desc: "Regenerate design/ rendered artefacts (.md, .csv, .d2, .png, .svg) from the sibling .yaml. See scripts/design-generate.sh."
    cmds:
      - scripts/design-generate.sh

  verify-function-tests:
    desc: Verify every leaf function in the functional decomposition has test coverage.
    cmds:
      - scripts/verify-function-tests.sh

  verify-dependencies:
    desc: Verify required CLI tools (python3, task, yq, ...) are installed on PATH.
    cmds:
      - scripts/verify-dependencies.sh

  pip-audit:
    desc: Scan dependencies for known vulnerabilities using pip-audit.
    cmds:
      - uv export --extra dev --no-emit-project --format requirements-txt --no-hashes > /tmp/requirements.txt
      - uvx pip-audit --strict -r /tmp/requirements.txt

  mutation-test:
    desc: Run mutmut against security-critical modules and gate the mutation score against [tool.mutation_score].fail_under.
    cmds:
      - scripts/mutation-test.sh {{.CLI_ARGS}}
      - scripts/check-mutation-score.sh

  reuse-lint:
    desc: Verify every tracked file carries SPDX licensing metadata (REUSE spec).
    cmds:
      - scripts/reuse-lint.sh

  verify-standards:
    desc: Verify Project Standards
    cmds:
      - scripts/verify-standards.sh

  verify-token-cli-http-parity:
    desc: Verify every `agent-auth token *` CLI subcommand has a matching HTTP route.
    cmds:
      - scripts/verify-token-cli-http-parity.sh

  build:
    desc: Build sdist and wheel distributions into dist/.
    cmds:
      - scripts/build.sh

  install-hooks:
    desc: Install project git hooks (lefthook).
    cmds:
      - scripts/install-hooks.sh

  release:
    desc: "Cut a release. With no args (task release), the next version is derived from conventional commits since the last v* tag (major/minor/patch from BREAKING/feat/fix). Pass an explicit version (task release -- 1.2.3) to override. The resolved version must match a ## [X.Y.Z] section in CHANGELOG.md. The script creates and pushes the tag vX.Y.Z and publishes the GitHub release."
    cmds:
      - scripts/release.sh {{.CLI_ARGS}}

  agent-auth:
    desc: Run the agent-auth CLI (e.g. `task agent-auth -- serve`).
    cmds:
      - scripts/agent-auth.sh {{.CLI_ARGS}}

  things-bridge:
    desc: Run the things-bridge CLI (e.g. `task things-bridge -- serve`).
    cmds:
      - scripts/things-bridge.sh {{.CLI_ARGS}}

  things-cli:
    desc: Run the things-cli client (e.g. `task things-cli -- todos list`).
    cmds:
      - scripts/things-cli.sh {{.CLI_ARGS}}

  things-client-applescript:
    desc: Run the things-client-cli-applescript CLI (macOS-only; e.g. `task things-client-applescript -- todos list`).
    cmds:
      - scripts/things-client-applescript.sh {{.CLI_ARGS}}

  gpg-bridge:
    desc: Run the gpg-bridge CLI (e.g. `task gpg-bridge -- serve`).
    cmds:
      - scripts/gpg-bridge.sh {{.CLI_ARGS}}

  gpg-cli:
    desc: Run the devcontainer gpg-cli (e.g. `task gpg-cli -- --version`).
    cmds:
      - scripts/gpg-cli.sh {{.CLI_ARGS}}

  gpg-backend-host:
    desc: Run the host gpg backend CLI directly (e.g. `task gpg-backend-host -- sign --local-user ...`).
    cmds:
      - scripts/gpg-backend-host.sh {{.CLI_ARGS}}
