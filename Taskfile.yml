# Run `task --list` to see every repeatable operation. See CONTRIBUTING.md.
#
# Structure: each packages/<svc>/Taskfile.yml is included as a
# namespace below so per-service dev loops are runnable directly
# (e.g. `task agent-auth:test`, `task things-bridge:lint`). The
# namespace `default` task in each included file preserves the
# service's existing CLI entry: `task agent-auth -- serve` still
# resolves to scripts/agent-auth.sh via the agent-auth namespace
# default. Root-level tasks below are the workspace-wide gates —
# `test`, `lint`, `typecheck`, `format`, `check` keep calling the
# scripts/*.sh sweepers because those also cover repo-root files
# (scripts/, tests/, benchmarks/, top-level *.md/*.toml) that no
# per-package namespace owns. They will convert to fan-outs over the
# namespaces once #270 relocates tests and benchmarks into per-package
# trees.

version: "3"

includes:
  # Namespace name matches the service's existing `task <svc>` entry
  # (so `task things-client-applescript` and `task gpg-backend-host`
  # keep working against the longer package directory names).
  # keep-sorted start
  agent-auth-common: ./packages/agent-auth-common/Taskfile.yml
  agent-auth: ./packages/agent-auth/Taskfile.yml
  gpg-backend-host: ./packages/gpg-backend-cli-host/Taskfile.yml
  gpg-bridge: ./packages/gpg-bridge/Taskfile.yml
  gpg-cli: ./packages/gpg-cli/Taskfile.yml
  things-bridge: ./packages/things-bridge/Taskfile.yml
  things-cli: ./packages/things-cli/Taskfile.yml
  things-client-applescript: ./packages/things-client-cli-applescript/Taskfile.yml
  # keep-sorted end

tasks:
  test:
    desc: Run the pytest suite inside the project virtualenv.
    cmds:
      - scripts/test.sh {{.CLI_ARGS}}

  changelog:test:
    desc: Run the unit tests for the workspace-level changelog tooling under scripts/changelog/. Kept separate from `task test` so the workspace coverage gate stays scoped to packages/*/src/.
    cmds:
      - scripts/changelog/test.sh {{.CLI_ARGS}}

  changelog:add:
    desc: "Scaffold a changelog/@unreleased/*.yml entry. Interactive walk-through with no flags; pass `-- --type <T> --description <D> --pr <N>` for non-interactive scripted use. See CONTRIBUTING.md § 'Authoring path'."
    cmds:
      - scripts/changelog/add.sh {{.CLI_ARGS}}

  changelog-add:
    desc: "Alias for `task changelog:add` (matches the spelling in #297's issue body)."
    cmds:
      - scripts/changelog/add.sh {{.CLI_ARGS}}

  benchmark:
    desc: Run the pytest-benchmark suite under packages/agent-auth/benchmarks/. See packages/agent-auth/benchmarks/README.md for the regression threshold and baseline refresh procedure.
    cmds:
      - scripts/benchmark.sh {{.CLI_ARGS}}

  lint:
    desc: Run all configured linters.
    cmds:
      - scripts/lint.sh

  format:
    desc: Run all configured formatters. Pass `-- --check` for diff-only mode.
    cmds:
      - scripts/format.sh {{.CLI_ARGS}}

  check:
    desc: Run all linters, assert formatting, and verify integration-test isolation + workspace dep graph.
    cmds:
      - scripts/lint.sh
      - scripts/format.sh --check
      - scripts/verify-integration-isolation.sh
      - scripts/verify_workspace_deps.py

  verify-workspace-deps:
    desc: Verify the workspace dep graph (packages/*/pyproject.toml) matches ADR 0036's allowlist.
    cmds:
      - scripts/verify_workspace_deps.py

  typecheck:
    desc: Run mypy + pyright on every packages/<svc>/src tree and tests/.
    cmds:
      - scripts/typecheck.sh

  verify-design:
    desc: Verify every leaf function in the functional decomposition is allocated in the product breakdown AND that design/ rendered artefacts (.md, .csv, .d2, .png, .svg) match the yaml.
    cmds:
      - scripts/verify-design.sh

  design:generate:
    desc: "Regenerate design/ rendered artefacts (.md, .csv, .d2, .png, .svg) from the sibling .yaml. See scripts/design-generate.sh."
    cmds:
      - scripts/design-generate.sh

  verify-function-tests:
    desc: Verify every leaf function in the functional decomposition has test coverage.
    cmds:
      - scripts/verify-function-tests.sh

  verify-dependencies:
    desc: Verify required CLI tools (python3, task, yq, ...) are installed on PATH.
    cmds:
      - scripts/verify-dependencies.sh

  mutation-test:
    desc: Run mutmut against security-critical modules and gate the mutation score against [tool.mutation_score].fail_under.
    cmds:
      - scripts/mutation-test.sh {{.CLI_ARGS}}
      - scripts/check-mutation-score.sh

  reuse-lint:
    desc: Verify every tracked file carries SPDX licensing metadata (REUSE spec).
    cmds:
      - scripts/reuse-lint.sh

  verify-standards:
    desc: Verify Project Standards
    cmds:
      - scripts/verify-standards.sh

  verify-token-cli-http-parity:
    desc: Verify every `agent-auth token *` CLI subcommand has a matching HTTP route.
    cmds:
      - packages/agent-auth/scripts/verify-token-cli-http-parity.sh

  build:
    desc: Build sdist and wheel distributions into dist/.
    cmds:
      - scripts/build.sh

  install-hooks:
    desc: Install project git hooks (lefthook).
    cmds:
      - scripts/install-hooks.sh

  setup-devcontainer-signing:
    desc: "Wire commit signing inside the devcontainer to the host's gpg-bridge. Required flags: --token <agent-auth gpg:sign=allow access token> --bridge-url <https URL of host gpg-bridge>. See CONTRIBUTING.md § 'Signed commits inside the devcontainer'."
    cmds:
      - scripts/setup-devcontainer-signing.sh {{.CLI_ARGS}}

  release:
    desc: "Cut a release. With no args (task release), the next version is derived from conventional commits since the last v* tag (major/minor/patch from BREAKING/feat/fix). Pass an explicit version (task release -- 1.2.3) to override. The resolved version must match a ## [X.Y.Z] section in CHANGELOG.md. The script creates and pushes the tag vX.Y.Z and publishes the GitHub release."
    cmds:
      - scripts/release.sh {{.CLI_ARGS}}
